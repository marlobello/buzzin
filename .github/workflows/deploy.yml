name: Deploy Buzzin

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  # ── Deploy infrastructure (only when infra files change) ─────────────────
  deploy-infra:
    name: Deploy Bicep Infrastructure
    runs-on: ubuntu-latest
    outputs:
      swa_token: ${{ steps.bicep.outputs.swaToken }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name rg-buzzin \
            --location eastus2 \
            --output none

      - name: Deploy Bicep
        id: bicep
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group rg-buzzin \
            --template-file infra/main.bicep \
            --parameters \
              environment=prod \
              location=eastus2 \
              repoOwner=${{ github.repository_owner }} \
              repoName=buzzin \
            --query "properties.outputs" \
            --output json)

          TOKEN=$(echo "$OUTPUT" | jq -r '.swaDeploymentToken.value')
          echo "swaToken=$TOKEN" >> $GITHUB_OUTPUT
          echo "::add-mask::$TOKEN"

          HOSTNAME=$(echo "$OUTPUT" | jq -r '.swaHostname.value')
          echo "Deployed to: https://$HOSTNAME"

  # ── Build & deploy app ──────────────────────────────────────────────────
  deploy-app:
    name: Build & Deploy App
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build SvelteKit
        run: npm run build

      - name: Install API dependencies
        run: cd api && npm ci

      - name: Build API
        run: cd api && npm run build

      - name: Deploy to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ needs.deploy-infra.outputs.swa_token || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: api
          output_location: build
          skip_app_build: true
          skip_api_build: true
